<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authify - Secure Gateway</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <div id="auth-card" class="card">
        <h2 id="form-title">Login to Authify</h2>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="enter your email">
        </div>

        <div class="input-group hidden" id="username-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="choose a username">
        </div>

        <div class="input-group" id="password-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <div class="input-group hidden" id="otp-group">
            <label>Enter 6-Digit OTP</label>
            <input type="text" id="otp" placeholder="123456" maxlength="6">
        </div>

        <button id="primary-btn" onclick="handlePrimaryAction()">Login</button>

        <p class="toggle-text" id="toggle-link-wrapper">
            Don't have an account? <a href="#" onclick="toggleForm(event)">Sign Up</a>
        </p>
    </div>

    <div id="dashboard-card" class="card hidden">
        <h2>Welcome Home!</h2>
        <div class="quote-box">
            <p id="quote-text">Loading secure quote...</p>
            <span id="quote-author"></span>
        </div>
        <p id="welcome-msg" class="success-msg"></p>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
